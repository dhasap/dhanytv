name: Auto Update IPTV Playlist

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Latest Source
        env:
          SRC: ${{ secrets.PLAYLIST_SOURCE }}
        run: |
          if [ -z "$SRC" ]; then
            echo "ERROR: Secret PLAYLIST_SOURCE belum diset!"
            exit 1
          fi
          echo "Mengunduh data terbaru..."
          curl -sL "$SRC" -o source_latest.m3u
          echo "Download selesai. Ukuran file: $(wc -c < source_latest.m3u) bytes"

      - name: Merge & Fix Playlist
        env:
          SANITIZE_PATTERNS: ${{ secrets.SANITIZE_PATTERNS }}
        run: |
          TARGET_FILE="dhanytv.m3u"
          SOURCE_FILE="source_latest.m3u"

          if [ ! -f "$TARGET_FILE" ]; then
            echo "ERROR: File $TARGET_FILE tidak ditemukan!"
            exit 1
          fi
          if [ ! -f "$SOURCE_FILE" ]; then
            echo "ERROR: File sumber gagal diunduh!"
            exit 1
          fi

          # Get our custom header
          HEADER_LINE=$(grep -m1 '^#EXTM3U.*url-tvg' "$TARGET_FILE" || grep -m1 '^#EXTM3U' "$TARGET_FILE")
          if [ -z "$HEADER_LINE" ]; then
            echo "ERROR: Header #EXTM3U tidak ditemukan!"
            exit 1
          fi

          OLD_COUNT=$(grep -c '#EXTINF' "$TARGET_FILE" || echo "0")
          NEW_COUNT=$(grep -c '#EXTINF' "$SOURCE_FILE" || echo "0")
          echo "Channel sebelum: $OLD_COUNT | sesudah: $NEW_COUNT"

          # Apply minimal fixes to source, preserving ALL props and URLs
          python3 << PYEOF
          import re
          import sys

          source_file = "$SOURCE_FILE"
          target_file = "$TARGET_FILE"
          header_line = '''$HEADER_LINE'''
          sanitize_patterns = "${SANITIZE_PATTERNS}" if "${SANITIZE_PATTERNS}" else ""

          # EPG mapping
          channel_to_epg = {
              'RCTI': 'RCTI.id', 'MNC TV': 'MNCTV.id', 'MNCTV': 'MNCTV.id',
              'GTV': 'GTV.id', 'Indosiar': 'Indosiar.id', 'SCTV': 'SCTV.id',
              'TransTV': 'TransTV.id', 'Trans TV': 'TransTV.id',
              'Trans7': 'Trans7.id', 'Trans 7': 'Trans7.id',
              'MDTV': 'MDTV.id', 'iNews': 'iNews.id',
              'Kompas TV': 'KompasTV.id', 'KompasTV': 'KompasTV.id',
              'Metro TV': 'MetroTV.id', 'MetroTV': 'MetroTV.id',
              'TVOne': 'tvOne.id', 'TV One': 'tvOne.id', 'tvOne': 'tvOne.id',
              'SindoNews': 'SindoNewsTV.id', 'ANTV': 'ANTV.id',
              'IDX': 'IDX.id', 'IDX Channel': 'IDX.id',
              'TVRI': 'TVRI.id', 'BTV': 'BTV.id',
              'CNN Indonesia': 'CNNIndonesia.id',
              'CNBC Indonesia': 'CNBCIndonesia.id',
              'DAAI TV': 'DAAITV.id',
              'RTV': 'RTV.id', 'Nusantara TV': 'NusantaraTV.id',
              'Garuda TV': 'GarudaTV.id', 'BN Channel': 'BNChannel.id',
              'MAGNA Channel': 'MagnaChannel.id',
              'HITS': 'HITS.id', 'Hits': 'HITS.id',
              'HITS Movies': 'HitsMovies.id', 'HitsMovies': 'HitsMovies.id',
              'Studio Universal': 'StudioUniversal.id',
              'AXN': 'AXN.id', 'GALAXY': 'GALAXY.id',
              'GALAXY Premium': 'GALAXYPremium.id',
              'Celestial Movies': 'CelestialMovies.id',
              'Indonesia Movie Channel': 'IMC.id', 'IMC': 'IMC.id',
              'Vision Prime': 'VisionPrime.id', 'VisionPrime': 'VisionPrime.id',
              'Entertainment': 'Ent.id', 'Food Travel': 'FoodTravel.id',
              'CelebritiesTV': 'CelebritiesTV.id', 'Celebrities TV': 'CelebritiesTV.id',
              'Hanacaraka TV': 'HanacarakaTV.id', 'HanacarakaTV': 'HanacarakaTV.id',
              'beIN Sports 1': 'beInSports1.id', 'beIN Sports 2': 'beInSports2.id',
              'beIN Sports 3': 'beInSports3.id',
              'Nickelodeon': 'Nickelodeon.id', 'Nick Jr': 'NickJr.id',
              'ZooMoo': 'ZooMoo.id', 'CBeebies': 'CBeebies.id',
              'DreamWorks': 'DreamWorks.id', 'Kids TV': 'KidsTV.id',
              'History': 'History.id', 'Thrill': 'Thrill.id',
              'Zee Bioskop': 'ZeeBioskop.id',
              'tvN Movies': 'tvNMovies.id', 'tvN': 'tvN.id',
              'CineEdge': 'CineEdge.id', 'Buddy Star': 'BuddyStar.id',
              'Muslim TV': 'MuslimTV.id', 'Al Quran': 'AlQuranKareem.id',
              'Tawaf TV': 'TawafTV.id', 'SPOTV': 'SPOTV.id', 'SPOTV 2': 'SPOTV2.id',
              'SpoTV': 'SPOTV.id', 'SpoTV 2': 'SPOTV2.id',
              'Lifetime': 'Lifetime.id', 'MTV 90s': 'MTV90s.id', 'MTV Live': 'MTVLive.id',
              'Music TV': 'MusicTV.id', 'Soccer Channel': 'SoccerChannel.id',
              'Fight Sports': 'FightSports.id', 'Outdoor Channel': 'OutdoorChannel.id',
              'Love Nature': 'LoveNature.id', 'Global Trekker': 'GlobalTrekker.id',
              'BBC Earth': 'BBCEarth.id', 'BBC News': 'BBCNews.id',
              'Crime Investigation': 'CrimeInvestigation.id', 'KIX': 'KIX.id',
              'ROCK Action': 'ROCKAction.id', 'ROCK Entertainment': 'ROCKEntertainment.id',
              'Jak TV': 'JakTV.id', 'JakTV': 'JakTV.id',
              'CNA': 'CNA.id', 'Channel News Asia': 'CNA.id',
              'Al Jazeera English': 'AlJazeeraEnglish.id', 'Al Jazeera': 'AlJazeeraEnglish.id',
              'NHK World Japan': 'NHKWorldJapan.id', 'NHK World': 'NHKWorldJapan.id',
              'NHK World Premium': 'NHKWorldPremium.id',
              'CGTN': 'CGTN.id', 'CGTN Documentary': 'CGTNDocumentary.id',
              'DW English': 'DWEnglish.id', 'DW': 'DWEnglish.id',
              'France 24': 'France24English.id',
              'Euronews': 'Euronews.id', 'Bloomberg': 'BloombergTV.id',
              'FOX News': 'FOXNews.id', 'Uniques': 'Uniques.id',
              'Originals': 'Originals.id', 'Superrix': 'Superrix.id',
              'LIFE': 'LIFE.id', 'CCM': 'CCM.id', 'Animax': 'Animax.id',
              'ONE': 'ONE.id', 'Arirang': 'Arirang.id',
              'Sportstars': 'Sportstars.id', 'Sportstars 2': 'Sportstars2.id',
              'Sportstars 3': 'Sportstars3.id', 'Sportstars 4': 'Sportstars4.id',
              'HGTV': 'HGTV.id',
              'CNN': 'CNN', 'BBC News': 'BBCNews',
              'Discovery Channel': 'DiscoveryChannel', 'Discovery': 'DiscoveryChannel',
              'Cartoon Network': 'CartoonNetwork', 'Animal Planet': 'Animal Planet',
              'Berita RTM': 'Berita RTM', 'TV1': 'TV1', 'TV2': 'TV2',
              'TV6': 'TV6', 'Okey': 'Okey',
              'Suria': 'Suria', 'Vasantham': 'Vasantham',
              'HBO': '401', 'HBO Hits': '402', 'HBO Family': '403',
              'HBO Signature': '401', 'Cinemax': '405',
          }

          def get_epg_id(name):
              clean = re.sub(r'\s*\(V\+\)\s*', '', name).strip()
              clean = re.sub(r'\s*\(ChannelFeed\)\s*', '', clean).strip()
              clean = re.sub(r'\s*\(DensTV\)\s*', '', clean).strip()
              clean = re.sub(r'\s*\(Dens TV\)\s*', '', clean).strip()
              clean = re.sub(r'\s*\(DENSTV\)\s*', '', clean).strip()
              clean = re.sub(r'\s*\(Channel Feed\)\s*', '', clean).strip()
              clean = re.sub(r'\s*\(VD\)\s*', '', clean).strip()
              clean = re.sub(r'\s*HD\s*$', '', clean).strip()
              clean = re.sub(r'^\s*,', '', clean).strip()
              if clean in channel_to_epg:
                  return channel_to_epg[clean]
              for key, epg_id in channel_to_epg.items():
                  if key.lower() == clean.lower():
                      return epg_id
              for key, epg_id in channel_to_epg.items():
                  if key.lower() in clean.lower() or clean.lower() in key.lower():
                      return epg_id
              return None

          # Source trace patterns
          source_traces = ['bluestraveller13', 'super-duper-spork', 'kitkatjoss']
          if sanitize_patterns:
              for p in sanitize_patterns.split('|'):
                  if p.strip():
                      source_traces.append(p.strip().lower())

          http_keep = ['122.248.43.242', 'cdn6.163189.xyz', '45.64.97.211',
                       'live.serverstreaming.net', 'stream.radiojar.com',
                       '103.58.160.157', 'live-pv-ta.amazon']

          # Read source file
          with open(source_file, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          output = []
          trace_removed = 0
          dens_fixed = 0
          http_fixed = 0
          epg_fixed = 0

          for line in lines:
              raw = line.rstrip('\n')

              # Skip source header (we use our own)
              if raw.startswith('#EXTM3U'):
                  continue

              # Skip source trace URLs
              if raw.startswith('http') and any(pat in raw.lower() for pat in source_traces):
                  trace_removed += 1
                  continue

              # Fix dens.tv URLs
              if raw.startswith('http') and 'dens.tv' in raw:
                  if raw.startswith('http://'):
                      raw = raw.replace('http://', 'https://', 1)
                      dens_fixed += 1
                  raw = re.sub(r'\?app_type=web&userid=lite&chname=[^\s]+', '', raw)
                  raw = re.sub(r'\?app_type=web&userid=lite', '', raw)

              # Fix http→https (safe only)
              if raw.startswith('http://') and not any(d in raw for d in http_keep):
                  raw = raw.replace('http://', 'https://', 1)
                  http_fixed += 1

              # Fix dens.tv referrer in props
              if raw.startswith('#EXTVLCOPT:http-referrer='):
                  raw = raw.replace('http://dens.tv', 'https://www.dens.tv/')
                  raw = raw.replace('https://dens.tv/', 'https://www.dens.tv/')

              # Fix EXTINF: EPG tvg-id + remove tvg-url
              if raw.startswith('#EXTINF'):
                  raw = re.sub(r'\s*tvg-url="[^"]*"', '', raw)
                  name_match = re.search(r',(.+?)$', raw.strip())
                  if name_match:
                      name = name_match.group(1).strip()
                      epg_id = get_epg_id(name)
                      if epg_id:
                          raw = re.sub(r'tvg-id="[^"]*"', f'tvg-id="{epg_id}"', raw)
                          epg_fixed += 1

              output.append(raw)

          # Add dens.tv referrer where missing
          final = []
          i = 0
          while i < len(output):
              line = output[i]
              if line.startswith('#EXTINF'):
                  j = i + 1
                  has_dens_url = False
                  has_dens_referrer = False
                  while j < len(output):
                      nl = output[j]
                      if nl.startswith('#EXTVLCOPT') or nl.startswith('#KODIPROP') or nl.startswith('#EXTGRP') or nl.startswith('###'):
                          if 'dens.tv' in nl and 'http-referrer' in nl:
                              has_dens_referrer = True
                          j += 1
                      elif nl.startswith('http') and 'dens.tv' in nl:
                          has_dens_url = True
                          break
                      elif nl.startswith('http') or nl.strip() == '':
                          break
                      else:
                          break
                  if has_dens_url and not has_dens_referrer:
                      final.append('#EXTVLCOPT:http-referrer=https://www.dens.tv/')
                      final.append('#EXTVLCOPT:http-user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/97.0.4692.99 Safari/537.36')
              final.append(line)
              i += 1

          # === Replace broken dens.tv channels with working alternatives ===
          # dens.tv blocks direct stream access (403), causing redirect to browser on OTT TV
          # Map: dens.tv URL pattern -> replacement entry (props + url)
          dens_replacements = {
              'h217': {  # SCTV
                  'name': 'SCTV',
                  'props': [
                      '#KODIPROP:inputstreamaddon=inputstream.adaptive',
                      '#KODIPROP:inputstream.adaptive.manifest_type=dash',
                      '#EXTVLCOPT:http-user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36',
                  ],
                  'url': 'https://cdnbal1.indihometv.com/atm/DASH/sctv/sctv-avc1_2500000=7-3277707030000000.mpd',
                  'extinf_template': '#EXTINF:-1 tvg-id="SCTV.id" tvg-logo="https://thumbor.prod.vidiocdn.com/kH-K9J4cROqL0TZrAyQhw7P5pBk=/230x230/filters:quality(70)/vidio-web-prod-livestreaming/uploads/livestreaming/square_image/204/4e9f5c.png" group-title="Indonesia Channels",SCTV',
              },
          }

          replaced = []
          new_final = []
          i = 0
          while i < len(final):
              line = final[i]
              # Check if this is a dens.tv stream URL
              if line.startswith('http') and 'dens.tv' in line:
                  # Check if this URL matches a known broken channel
                  matched_key = None
                  for key, repl in dens_replacements.items():
                      if f'/{key}/' in line:
                          matched_key = key
                          break
                  if matched_key:
                      repl = dens_replacements[matched_key]
                      # Find the #EXTINF line for this entry (look backwards)
                      extinf_idx = None
                      props_start = i - 1
                      for k in range(i - 1, max(i - 20, -1), -1):
                          if final[k].startswith('#EXTINF'):
                              extinf_idx = k
                              break
                          if final[k].startswith('#EXTINF') or (not final[k].startswith('#') and not final[k].startswith('http')):
                              break
                      if extinf_idx is not None:
                          # Remove old entry (props + extinf + url)
                          # Skip from extinf_idx to i (inclusive)
                          # Add replacement entry
                          new_final.append('')
                          for p in repl['props']:
                              new_final.append(p)
                          new_final.append(repl['extinf_template'])
                          new_final.append(repl['url'])
                          replaced.append(f"{repl['name']} (dens.tv -> Indihometv DASH)")
                          # Skip the old lines
                          while i < len(final) and not (final[i].startswith('#EXTINF') or (final[i].startswith('#') and not final[i].startswith('#EXTVLCOPT') and not final[i].startswith('#KODIPROP') and not final[i].startswith('#EXTGRP'))):
                              if i > extinf_idx:
                                  pass  # skip old props/extinf
                              i += 1
                              if i < len(final) and (final[i].startswith('#EXTINF') or final[i].strip() == ''):
                                  break
                          continue
                      else:
                          new_final.append(line)
                  else:
                      new_final.append(line)
              elif line.startswith('#EXTINF') or line.startswith('#EXTVLCOPT') or line.startswith('#KODIPROP') or line.startswith('#EXTGRP'):
                  # Check if next URL is a dens.tv replacement target
                  # Look ahead to find the URL
                  is_before_replaced = False
                  for k in range(i + 1, min(i + 15, len(final))):
                      if final[k].startswith('http') and 'dens.tv' in final[k]:
                          for key in dens_replacements:
                              if f'/{key}/' in final[k]:
                                  is_before_replaced = True
                                  break
                          break
                      if final[k].startswith('#EXTINF') or (not final[k].startswith('#') and not final[k].startswith('http')):
                          break
                  if not is_before_replaced:
                      new_final.append(line)
                  # else: skip this prop/extinf line (it's part of a replaced entry)
              else:
                  new_final.append(line)
              i += 1

          final = new_final

          # Deduplicate EXTVLCOPT props (remove consecutive duplicates)
          cleaned = []
          prev_lines = set()
          for line in final:
              if line.startswith('#EXTVLCOPT') or line.startswith('#KODIPROP'):
                  if line in prev_lines:
                      continue
                  prev_lines.add(line)
              else:
                  prev_lines = set()
              cleaned.append(line)
          final = cleaned

          # Write output
          with open(target_file, 'w', encoding='utf-8') as f:
              f.write(header_line + '\n\n')
              f.write('\n'.join(final) + '\n')

          ch_count = sum(1 for l in final if l.startswith('#EXTINF'))
          print(f"Channel: {ch_count}")
          print(f"Source traces removed: {trace_removed}")
          print(f"dens.tv fixed: {dens_fixed}")
          print(f"HTTP→HTTPS: {http_fixed}")
          print(f"EPG tvg-id mapped: {epg_fixed}")
          if replaced:
              print(f"dens.tv replaced (broken -> working): {len(replaced)}")
              for r in replaced:
                  print(f"  - {r}")
          PYEOF

          rm -f "$SOURCE_FILE"
          AFTER=$(grep -c '#EXTINF' "$TARGET_FILE" || echo "0")
          echo "Channel setelah merge: $AFTER"

      - name: Clean Playlist & Generate OTT Variant
        run: |
          echo "=== Clean Playlist & Generate OTT Variant ==="
          python3 update-script/cleanup_playlist.py dhanytv.m3u --write --ott-output dhanytv-ott.m3u --check
          echo "Playlist channels : $(grep -c '#EXTINF' dhanytv.m3u || echo '0')"
          echo "OTT channels      : $(grep -c '#EXTINF' dhanytv-ott.m3u || echo '0')"

      - name: Generate Custom EPG
        run: |
          echo "=== Generate Custom EPG ==="
          TARGET_FILE="dhanytv.m3u"
          EPG_OUTPUT="epg.xml"
          EPG_BASE="https://raw.githubusercontent.com/AqFad2811/epg/refs/heads/main"

          echo "Downloading EPG sources..."
          for f in indonesia.xml astro.xml singapore.xml rtmklik.xml unifitv.xml; do
            echo "  Downloading $f..."
            curl -sL "${EPG_BASE}/${f}" -o "${f}" || echo "  WARNING: $f gagal diunduh"
          done

          python3 update-script/generate_epg.py --m3u "$TARGET_FILE" --output "$EPG_OUTPUT"

          rm -f indonesia.xml astro.xml singapore.xml rtmklik.xml unifitv.xml

          if [ -f "$EPG_OUTPUT" ]; then
            echo "Custom EPG generated: $(du -h $EPG_OUTPUT | cut -f1)"
          else
            echo "WARNING: Custom EPG gagal di-generate!"
          fi

      - name: Check for Changes
        id: check_changes
        run: |
          CHANGED_FILES=$(git status --porcelain -- dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/cleanup_playlist.py update-script/generate_epg.py)
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES"
            git diff --stat dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/cleanup_playlist.py update-script/generate_epg.py || true
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/cleanup_playlist.py update-script/generate_epg.py
          COMMIT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          CHANNEL_COUNT=$(grep -c '#EXTINF' dhanytv.m3u || echo "0")
          OTT_CHANNEL_COUNT=$(grep -c '#EXTINF' dhanytv-ott.m3u 2>/dev/null || echo "0")
          EPG_CHANNELS=$(grep -c '<channel ' epg.xml 2>/dev/null || echo "0")
          git commit -m "auto-update: Playlist + OTT + EPG ($CHANNEL_COUNT ch, $OTT_CHANNEL_COUNT OTT, $EPG_CHANNELS EPG) - $COMMIT_DATE"
          git push

      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "  Auto-Update IPTV Playlist + EPG"
          echo "============================================"
          echo "Tanggal   : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Channel   : $(grep -c '#EXTINF' dhanytv.m3u 2>/dev/null || echo 'N/A')"
          echo "OTT Ch    : $(grep -c '#EXTINF' dhanytv-ott.m3u 2>/dev/null || echo 'N/A')"
          echo "EPG Ch    : $(grep -c '<channel ' epg.xml 2>/dev/null || echo 'N/A')"
          echo "EPG Size  : $(du -h epg.xml 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "Perubahan : ${{ steps.check_changes.outputs.has_changes }}"
          echo "============================================"
