name: Auto Update IPTV Playlist

on:
  schedule:
    # Daily at 00:00 UTC (07:00 WIB) so the EPG guide stays fresh — EPG sources
    # update daily, a weekly rebuild left the guide stale within a day or two.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Latest Source
        env:
          SRC: ${{ secrets.PLAYLIST_SOURCE }}
        run: |
          if [ -z "$SRC" ]; then
            echo "ERROR: Secret PLAYLIST_SOURCE belum diset!"
            exit 1
          fi
          echo "Mengunduh data terbaru..."
          curl -sL "$SRC" -o source_latest.m3u
          echo "Download selesai. Ukuran file: $(wc -c < source_latest.m3u) bytes"

      - name: Merge & Fix Playlist
        env:
          SANITIZE_PATTERNS: ${{ secrets.SANITIZE_PATTERNS }}
        run: |
          TARGET_FILE="dhanytv.m3u"
          SOURCE_FILE="source_latest.m3u"

          if [ ! -f "$TARGET_FILE" ]; then
            echo "ERROR: File $TARGET_FILE tidak ditemukan!"
            exit 1
          fi
          if [ ! -f "$SOURCE_FILE" ]; then
            echo "ERROR: File sumber gagal diunduh!"
            exit 1
          fi

          OLD_COUNT=$(grep -c '#EXTINF' "$TARGET_FILE" || echo "0")
          echo "Channel sebelum: $OLD_COUNT"

          SANITIZE_ARG=()
          if [ -n "$SANITIZE_PATTERNS" ]; then
            SANITIZE_ARG=(--sanitize "$SANITIZE_PATTERNS")
          fi

          python3 update-script/merge_source.py "$SOURCE_FILE" --target "$TARGET_FILE" "${SANITIZE_ARG[@]}"

          rm -f "$SOURCE_FILE"
          AFTER=$(grep -c '#EXTINF' "$TARGET_FILE" || echo "0")
          echo "Channel setelah merge: $AFTER"

      - name: Inject Curated Extra Channels (World Cup, events)
        run: |
          echo "=== Injecting curated extra channels (update-script/extra_channels.m3u) ==="
          BEFORE=$(grep -c '#EXTINF' dhanytv.m3u || true); BEFORE=${BEFORE:-0}
          python3 update-script/merge_extra.py --ci
          AFTER=$(grep -c '#EXTINF' dhanytv.m3u || true); AFTER=${AFTER:-0}
          echo "Extra channels: $((AFTER - BEFORE)) injected (total: $AFTER)"

      - name: Merge International Channels (iptv-org)
        run: |
          echo "=== Merging international channels from iptv-org ==="
          BEFORE=$(grep -c '#EXTINF' dhanytv.m3u || echo "0")
          python3 update-script/merge_international.py --ci
          AFTER=$(grep -c '#EXTINF' dhanytv.m3u || echo "0")
          ADDED=$((AFTER - BEFORE))
          echo "International channels: $ADDED added (total: $AFTER)"

      - name: Clean Playlist & Generate OTT Variant
        env:
          SANITIZE_PATTERNS: ${{ secrets.SANITIZE_PATTERNS }}
        run: |
          echo "=== Clean Playlist & Generate OTT Variant ==="
          SANITIZE_ARG=()
          if [ -n "$SANITIZE_PATTERNS" ]; then
            SANITIZE_ARG=(--sanitize "$SANITIZE_PATTERNS")
          fi
          python3 update-script/cleanup_playlist.py dhanytv.m3u --write --ott-output dhanytv-ott.m3u --check "${SANITIZE_ARG[@]}"
          echo "Playlist channels : $(grep -c '#EXTINF' dhanytv.m3u || echo '0')"
          echo "OTT channels      : $(grep -c '#EXTINF' dhanytv-ott.m3u || echo '0')"

      - name: Download EPG Sources (Multi-Source)
        run: |
          echo "=== Downloading EPG sources ==="
          FAIL_COUNT=0

          # AqFad2811/epg (primary)
          # NOTE: epg.xml renamed to aqfad_epg.xml to avoid collision with output
          AQFAD_BASE="https://raw.githubusercontent.com/AqFad2811/epg/refs/heads/main"
          for f in indonesia.xml astro.xml singapore.xml rtmklik.xml unifitv.xml sooka.xml; do
            echo "  AqFad: $f"
            curl -sL "${AQFAD_BASE}/${f}" -o "${f}" || { echo "  WARNING: $f gagal"; FAIL_COUNT=$((FAIL_COUNT+1)); }
          done
          echo "  AqFad: epg.xml -> aqfad_epg.xml"
          curl -sL "${AQFAD_BASE}/epg.xml" -o "aqfad_epg.xml" || { echo "  WARNING: aqfad_epg.xml gagal"; FAIL_COUNT=$((FAIL_COUNT+1)); }

          # epgshare01.online (gzipped, daily updated)
          EPGSHARE_BASE="https://epgshare01.online/epgshare01"
          for f in ID1 SG1 MY1 CA2 IT1 FR1 AE1 IN1 ALJAZEERA1; do
            echo "  epgshare01: $f"
            curl -sL "${EPGSHARE_BASE}/epg_ripper_${f}.xml.gz" -o "epgshare01_${f}.xml.gz"
            if gunzip -f "epgshare01_${f}.xml.gz" 2>/dev/null; then
              echo "    OK: $(wc -c < epgshare01_${f}.xml) bytes"
            else
              echo "  WARNING: $f gunzip gagal"
              rm -f "epgshare01_${f}.xml.gz"
              FAIL_COUNT=$((FAIL_COUNT+1))
            fi
          done

          # open-epg.com
          echo "  open-epg: indonesia.xml"
          curl -sL "https://www.open-epg.com/files/indonesia.xml" -o "open_epg_indonesia.xml" || { echo "  WARNING: open-epg gagal"; FAIL_COUNT=$((FAIL_COUNT+1)); }

          echo "EPG sources downloaded. Failures: $FAIL_COUNT"
          if [ "$FAIL_COUNT" -ge 10 ]; then
            echo "ERROR: Too many EPG source failures ($FAIL_COUNT), aborting."
            exit 1
          fi

      - name: Generate Custom EPG
        run: |
          echo "=== Generate Custom EPG ==="
          python3 update-script/generate_epg.py \
            --m3u dhanytv.m3u \
            --output epg.xml \
            --sources \
              epgshare01_ID1.xml epgshare01_SG1.xml epgshare01_MY1.xml \
              epgshare01_CA2.xml epgshare01_IT1.xml epgshare01_FR1.xml \
              epgshare01_AE1.xml epgshare01_IN1.xml epgshare01_ALJAZEERA1.xml \
              open_epg_indonesia.xml \
              indonesia.xml astro.xml singapore.xml rtmklik.xml unifitv.xml \
              aqfad_epg.xml sooka.xml

          # Cleanup source files ONLY (not output epg.xml!)
          rm -f indonesia.xml astro.xml singapore.xml rtmklik.xml unifitv.xml sooka.xml
          rm -f aqfad_epg.xml epgshare01_*.xml open_epg_indonesia.xml

          if [ -f "epg.xml" ] && [ -s "epg.xml" ]; then
            echo "Custom EPG generated: $(du -h epg.xml | cut -f1)"
            echo "EPG channels: $(grep -c '<channel ' epg.xml)"
            echo "EPG programmes: $(grep -c '<programme ' epg.xml)"
          else
            echo "ERROR: Custom EPG gagal di-generate!"
            exit 1
          fi

      - name: Safety Gate (cegah penghapusan channel/EPG tidak sengaja)
        run: |
          echo "=== Safety gate: memverifikasi tidak ada yang terhapus tidak sengaja ==="
          OLD_CH=$(git show HEAD:dhanytv.m3u 2>/dev/null | grep -c '#EXTINF' || true); OLD_CH=${OLD_CH:-0}
          NEW_CH=$(grep -c '#EXTINF' dhanytv.m3u || true); NEW_CH=${NEW_CH:-0}
          OLD_PROG=$(git show HEAD:epg.xml 2>/dev/null | grep -c '<programme ' || true); OLD_PROG=${OLD_PROG:-0}
          NEW_PROG=$(grep -c '<programme ' epg.xml || true); NEW_PROG=${NEW_PROG:-0}
          WC=$(grep -c 'group-title="WorldCup 2026"' dhanytv.m3u || true); WC=${WC:-0}
          echo "Channels: $OLD_CH -> $NEW_CH | EPG programmes: $OLD_PROG -> $NEW_PROG | WorldCup: $WC"
          if [ "$WC" -lt 1 ]; then
            echo "ERROR: Channel WorldCup 2026 hilang! Abort tanpa commit."
            exit 1
          fi
          if [ "$OLD_CH" -gt 0 ] && [ "$NEW_CH" -lt $((OLD_CH * 60 / 100)) ]; then
            echo "ERROR: Jumlah channel turun >40% ($OLD_CH -> $NEW_CH). Abort agar playlist tidak terhapus."
            exit 1
          fi
          if [ "$OLD_PROG" -gt 0 ] && [ "$NEW_PROG" -lt $((OLD_PROG * 50 / 100)) ]; then
            echo "ERROR: EPG programme turun >50% ($OLD_PROG -> $NEW_PROG). Abort agar EPG tidak rusak."
            exit 1
          fi
          echo "Safety gate passed."

      - name: Check for Changes
        id: check_changes
        run: |
          CHANGED_FILES=$(git status --porcelain -- dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/)
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES"
            git diff --stat dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/ || true
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dhanytv.m3u dhanytv-ott.m3u epg.xml update-script/
          COMMIT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          CHANNEL_COUNT=$(grep -c '#EXTINF' dhanytv.m3u || echo "0")
          OTT_CHANNEL_COUNT=$(grep -c '#EXTINF' dhanytv-ott.m3u 2>/dev/null || echo "0")
          EPG_CHANNELS=$(grep -c '<channel ' epg.xml 2>/dev/null || echo "0")
          git commit -m "auto-update: Playlist + OTT + EPG ($CHANNEL_COUNT ch, $OTT_CHANNEL_COUNT OTT, $EPG_CHANNELS EPG) - $COMMIT_DATE"
          git push

      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "  Auto-Update IPTV Playlist + EPG"
          echo "============================================"
          echo "Tanggal   : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Channel   : $(grep -c '#EXTINF' dhanytv.m3u 2>/dev/null || echo 'N/A')"
          echo "OTT Ch    : $(grep -c '#EXTINF' dhanytv-ott.m3u 2>/dev/null || echo 'N/A')"
          echo "EPG Ch    : $(grep -c '<channel ' epg.xml 2>/dev/null || echo 'N/A')"
          echo "EPG Size  : $(du -h epg.xml 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "Perubahan : ${{ steps.check_changes.outputs.has_changes }}"
          echo "============================================"
